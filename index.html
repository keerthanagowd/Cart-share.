<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartShare | Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <div class="auth-wrapper d-flex align-items-center justify-content-center">
    <div class="auth-card shadow">

      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-2">🛒</div>
        <h2 class="fw-bold mb-0">CartShare</h2>
        <p class="text-muted small">Collaborative shopping, made simple.</p>
      </div>

      <ul class="nav nav-pills nav-justified mb-3" id="authTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">Login</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">Register</button>
        </li>
      </ul>

      <div class="tab-content">

        <div class="tab-pane fade show active" id="login-pane">
          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="loginEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <div id="loginError" class="text-danger small mb-2"></div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>

        <div class="tab-pane fade" id="register-pane">
          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="regName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="regEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="regPassword" minlength="4" required>
            </div>
            <div id="registerError" class="text-danger small mb-2"></div>
            <div id="registerSuccess" class="text-success small mb-2"></div>
            <button type="submit" class="btn btn-success w-100">Create Account</button>
          </form>
        </div>

      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {

    if (getCurrentUser()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const errorBox = document.getElementById('loginError');

      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) {
        errorBox.textContent = 'Invalid email or password.';
        return;
      }

      setCurrentUser(user);
      window.location.href = 'dashboard.html';
    });
