<!DOCTYPE html>
<html>
<head>
    <title>Room - My Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #e6f7f1; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .logout { background: #dc3545; }
        .back { background: #6c757d; }
        #itemList li { padding: 8px; border-bottom: 1px solid #ddd; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <h1>Room Details</h1>
    <div class="card">
        <h3>Room Code: <span id="roomCode"></span></h3>
        <p>Room Name: My Cart</p>
        <p>Members: <span id="memberCount">1</span></p>
    </div>

    <h3>Add Item to Cart</h3>
    <input type="text" id="itemName" placeholder="Item name: Milk, Bread...">
    <button onclick="addItem()">Add Item</button>

    <h3>Cart Items</h3>
    <ul id="itemList"></ul>

    <button class="logout" onclick="logout()">Logout</button>
    <button class="back" onclick="location.href='/'">Back to Dashboard</button>

<script>
    // Nee Firebase config ikkada paste chey
    const firebaseConfig = {
            apiKey: "AIzaSyAs3CvhqVdtkrHQiyQ8e73xc2epccQ-FCU",
    authDomain: "keerthana-cart-cd619.firebaseapp.com",
    databaseURL: "https://keerthana-cart-cd619-default-rtdb.firebaseio.com",
    projectId: "keerthana-cart-cd619",
    storageBucket: "keerthana-cart-cd619.firebasestorage.app",
    messagingSenderId: "697786591134",
    appId: "1:697786591134:web:b6d4e4ec0f6f9fc3b4588f",
    measurementId: "G-Z7SS0EWQGF"};
    firebase.initializeApp(firebaseConfig);
    
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    document.getElementById('roomCode').innerText = roomCode;
    
    const roomRef = firebase.database().ref('rooms/' + roomCode);
    
    // Items load chey
    roomRef.child('items').on('value', (snapshot) => {
        const items = snapshot.val();
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        for (let key in items) {
            list.innerHTML += `<li>${items[key].name}</li>`;
        }
    });
    
    // Item add chey
    function addItem() {
        const itemName = document.getElementById('itemName').value;
        if (itemName) {
            roomRef.child('items').push({ name: itemName });
            document.getElementById('itemName').value = '';
        }
    }
    
    function logout() { alert('Logout code add chey'); }
</script>
</body>
</html>
