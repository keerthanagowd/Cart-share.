<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartShare | Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <nav class="navbar navbar-dark app-navbar px-3">
    <span class="navbar-brand fw-bold">🛒 CartShare</span>
    <div class="d-flex align-items-center gap-3">
      <span id="roomBadge" class="badge bg-light text-dark d-none"></span>
      <span id="userGreeting" class="text-light small d-none d-md-inline"></span>
      <button class="btn btn-sm btn-outline-light" onclick="logoutUser()">Logout</button>
    </div>
  </nav>

  <!-- ===================== ROOM GATE ===================== -->
  <!-- Shown until the user creates or joins a room -->
  <div id="roomGate" class="room-gate-wrapper d-flex align-items-center justify-content-center">
    <div class="room-gate-card shadow">
      <h4 class="fw-bold mb-3 text-center">Join or Create a Room</h4>
      <p class="text-muted small text-center mb-4">A Room is a shared cart your whole group can see and edit together.</p>

      <div class="mb-4">
        <label class="form-label small fw-semibold">Have a room code?</label>
        <div class="input-group">
          <input type="text" id="joinCodeInput" class="form-control text-uppercase" placeholder="e.g. X7K2P9" maxlength="6">
          <button class="btn btn-primary" id="joinRoomBtn">Join Room</button>
        </div>
        <div id="joinError" class="text-danger small mt-1"></div>
      </div>

      <div class="text-center text-muted small mb-3">— or —</div>

      <button class="btn btn-success w-100" id="createRoomBtn">Create a New Room</button>
    </div>
  </div>

  <!-- ===================== MAIN APP (hidden until in a room) ===================== -->
  <div id="appArea" class="container-fluid py-3 d-none">
    <div class="row g-3">

      <!-- ---------- PRODUCT GALLERY ---------- -->
      <div class="col-lg-7">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-2">
          <h5 class="fw-bold mb-0">Product Catalog</h5>
          <select id="categoryFilter" class="form-select form-select-sm w-auto">
            <option value="all">All Categories</option>
          </select>
        </div>
        <div id="productGallery" class="row g-3"></div>
      </div>

      <!-- ---------- CART SIDEBAR ---------- -->
      <div class="col-lg-3">
        <div class="cart-panel shadow-sm">
          <h5 class="fw-bold mb-2">🛍️ Shared Cart</h5>

          <div class="delivery-progress mb-3">
            <div class="d-flex justify-content-between small mb-1">
              <span>Free delivery progress</span>
              <span id="deliveryPct">0%</span>
            </div>
            <div class="progress" style="height: 8px;">
              <div id="deliveryBar" class="progress-bar bg-success" style="width:0%"></div>
            </div>
            <div class="small text-muted mt-1" id="deliveryNote"></div>
          </div>

          <div id="cartItems" class="cart-items-list mb-3"></div>

          <div class="d-flex justify-content-between fw-bold border-top pt-2">
            <span>Total</span>
            <span id="cartTotal">$0.00</span>
          </div>

          <a href="receipt.html" class="btn btn-dark w-100 mt-3">🧾 View / Print Receipt</a>
        </div>
      </div>

      <!-- ---------- ACTIVITY LOG ---------- -->
      <div class="col-lg-2">
        <div class="activity-panel shadow-sm">
          <h6 class="fw-bold mb-2">Activity Feed</h6>
          <div id="activityFeed" class="activity-feed"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast notification container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastBody">Update</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/products.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
