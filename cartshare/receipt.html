<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartShare | Receipt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Toolbar: hidden when printing, via .no-print -->
  <div class="no-print receipt-toolbar d-flex justify-content-between align-items-center px-3 py-2">
    <a href="dashboard.html" class="btn btn-sm btn-outline-secondary">← Back to Dashboard</a>
    <button class="btn btn-sm btn-dark" onclick="window.print()">🖨️ Print / Save as PDF</button>
  </div>

  <div class="receipt-wrapper">
    <div id="receiptCard" class="receipt-card shadow-sm">

      <div class="receipt-header text-center mb-3">
        <h3 class="fw-bold mb-0">🛒 CartShare</h3>
        <div class="text-muted small">Group Order Receipt</div>
      </div>

      <div class="receipt-meta mb-3">
        <div class="d-flex justify-content-between small">
          <span><strong>Room Code:</strong> <span id="metaRoomCode">-</span></span>
          <span><strong>Date:</strong> <span id="metaDate">-</span></span>
        </div>
        <div class="small mt-1"><strong>Participants:</strong> <span id="metaMembers">-</span></div>
      </div>

      <hr>

      <table class="table table-sm receipt-table">
        <thead>
          <tr>
            <th>Item</th>
            <th class="text-center">Qty</th>
            <th class="text-end">Price</th>
            <th class="text-end">Subtotal</th>
            <th>Added By</th>
          </tr>
        </thead>
        <tbody id="receiptItems">
          <!-- rows injected by JS -->
        </tbody>
      </table>

      <hr>

      <div class="d-flex justify-content-between fw-bold fs-5">
        <span>Total</span>
        <span id="receiptTotal">$0.00</span>
      </div>

      <div id="deliveryStatus" class="small text-center mt-2"></div>

      <div class="receipt-footer text-center text-muted small mt-4">
        Generated by CartShare — A Collaborative Shopping Ecosystem
      </div>

    </div>
  </div>

<script src="js/app.js"></script>
<script src="js/receipt.js"></script>
</body>
</html>
